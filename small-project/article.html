<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Static Project Analytics</title>
<link rel="stylesheet" href="/Stylesheets/article.css">
<script async src="/Script-files/article.js"></script>
</head>
<body>
<div class="container">
<aside class="sidebar">
    <div class="logo">Dashboard</div>
    <ul class="nav">
        <li><a href="static.html">Home</a></li>
        <li><a href="analytics.html">Analytics</a></li>
        <li><a href="article.html">Article</a></li>
        <li><a href="users.html">Users</a></li>
        <li><a href="reports.html">Reports</a></li>
        <li><a href="settings.html">Settings</a></li>
    </ul>
</aside>
<main class="main">
    <!--  -->
    <div class="chart-card">
        <h2>Create New Article</h2>
        <form id="articleForm" class="article-form">
            <div class="form-group">
                <label>Article Title</label>
                <input type="text" id="title" name="title" placeholder="Enter title">
            </div>
            <div class="form-group">
                <label for="category">Category</label>
                <select id="category" name="category" required>
                    <option value=""> Select Category</option>
                    <option value="technology">Technology</option>
                    <option value="business">Business</option> 
                    <option value="sports">Sports</option>
                    <option value="education">Education</option>
                </select>
            </div>
            <div class="form-group">
                <label for="summary">Summary</label>
                <textarea id="summary" name="summary" rows="4" placeholder="enter article summary" required></textarea>
            </div>

            <div class="form-group">
                <label for="content">Body Content</label>
                <textarea id="content" name="content" rows="10" placeholder="Write your summary here.." required></textarea>
            </div>
            <div class="form-group">
                <label for="author-name">Author</label>
                <select id="category" name="category" required>
                    <option value="">Select Name</option>
                    <option>Rakesh Mohanty</option>
                    <option>Soumya Das</option> 
                    <option>Jaydev Mallick</option>
                    <option>Muktikanta Mandal</option>
                </select>
            </div>
        <div class="asset-container">
            <label class="asset-label">Assets</label>
            <div class="upload-box" id="dropArea">
        <div class="upload-icon">⬆</div>
        <h2>Drag and Drop assets here</h2>
        <p>Support for JPG, PNG, and GIF files up to 10MB</p>
        <span>Or</span>
        <div class="file-input-wrapper">
        <input type="file" id="fileInput" accept=".jpg,.jpeg,.png,.gif">
        </div>
        <div id="fileName"></div>
        </div>
    </div>
            <button type="submit" class="save-btn">
                Save Article
            </button>
        </form>
    </div>
</main>
</div>
</body>
</html>
